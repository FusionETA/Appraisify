<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Submitted – Appraisify</title>
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@200;300;400;500;600;700;800&display=swap" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
  <link href="../assets/css/main.css" rel="stylesheet"/>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            primary: '#136dec',
            'bitrix-blue': '#2fc6f6',
            'background-light': '#f0f3f5',
            'background-dark': '#101822',
          },
          fontFamily: { sans: ['Manrope', 'sans-serif'] },
          borderRadius: { DEFAULT: '0.25rem', lg: '0.5rem', xl: '0.75rem', full: '9999px' },
        },
      },
    }
  </script>
</head>
<body class="bg-background-light text-slate-800 font-sans min-h-screen flex items-center justify-center">

<div class="w-full max-w-lg mx-auto px-6 py-12">

  <!-- Logo -->
  <div class="flex items-center justify-center mb-10">
    <img src="../assets/branding/logos/appraisify-wordmark-7.svg" alt="Appraisify" class="h-12 w-auto"/>
  </div>

  <!-- Card -->
  <div class="bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden">

    <!-- Success state -->
    <div id="state-success" class="p-10 text-center">

      <!-- Icon -->
      <div id="icon-wrapper" class="w-24 h-24 rounded-full flex items-center justify-center mx-auto mb-6">
        <span id="icon-symbol" class="material-symbols-outlined text-5xl" style="font-variation-settings:'FILL' 1">check_circle</span>
      </div>

      <h1 id="conf-title" class="text-3xl font-extrabold text-slate-900 mb-3">Submitted!</h1>
      <p id="conf-message" class="text-slate-500 text-base max-w-sm mx-auto leading-relaxed mb-8">
        Your appraisal has been submitted successfully.
      </p>

      <!-- What happens next -->
      <div id="next-steps" class="bg-slate-50 rounded-xl p-5 mb-8 text-left">
        <p class="text-xs font-semibold text-slate-500 uppercase tracking-wider mb-3">What happens next</p>
        <div id="next-steps-list" class="space-y-2">
          <!-- populated by JS -->
        </div>
      </div>

      <!-- Actions -->
      <div class="flex flex-col sm:flex-row gap-3 justify-center">
        <button onclick="downloadReport()" id="btn-pdf"
          class="flex items-center justify-center gap-2 px-6 py-2.5 rounded-xl border border-slate-200 bg-white text-sm font-semibold text-slate-600 hover:bg-slate-50 transition-colors">
          <span class="material-symbols-outlined text-lg">picture_as_pdf</span>
          Download PDF
        </button>
        <a href="dashboard.html?submitted=1"
          class="flex items-center justify-center gap-2 px-7 py-2.5 rounded-xl bg-primary text-white text-sm font-bold hover:bg-primary/90 transition-colors shadow-sm shadow-primary/30">
          <span class="material-symbols-outlined text-lg">dashboard</span>
          Return to Dashboard
        </a>
      </div>
    </div>

    <!-- Footer -->
    <div class="px-10 py-4 border-t border-slate-100 bg-slate-50/50 text-center">
      <p class="text-xs text-slate-400" id="conf-ref"></p>
    </div>
  </div>

  <p class="text-center text-xs text-slate-400 mt-6">© 2024 Appraisify. All rights reserved.</p>
</div>

<script>
  const PHASE_CONFIG = {
    self: {
      icon:    'check_circle',
      iconBg:  'bg-primary/10',
      iconCls: 'text-primary',
      title:   'Self-Assessment Submitted!',
      message: 'Your self-assessment has been recorded. Your reviewer has been notified and will complete their evaluation next.',
      next: [
        { icon: 'person', text: 'Reviewer will be notified to complete their evaluation' },
        { icon: 'group', text: 'Partner review will follow after the reviewer completes their scores' },
        { icon: 'analytics', text: 'Final summary will be available on your dashboard once all phases are complete' },
      ]
    },
    reviewer: {
      icon:    'task_alt',
      iconBg:  'bg-emerald-100',
      iconCls: 'text-emerald-600',
      title:   'Evaluation Completed!',
      message: 'Your reviewer evaluation has been submitted. The partner has been notified to begin their review.',
      next: [
        { icon: 'handshake', text: 'Partner has been notified to begin their review' },
        { icon: 'analytics', text: 'Final summary will be generated once the partner completes their review' },
        { icon: 'notifications', text: 'You will be notified when the full cycle is complete' },
      ]
    },
    partner: {
      icon:    'stars',
      iconBg:  'bg-purple-100',
      iconCls: 'text-purple-600',
      title:   'Review Finalized!',
      message: 'The partner review is complete. All three appraisal phases are now finished. The final summary is now available.',
      next: [
        { icon: 'analytics', text: 'Combined appraisal summary is now visible on the dashboard' },
        { icon: 'picture_as_pdf', text: 'A PDF report has been generated and saved to Bitrix24 Drive' },
        { icon: 'notifications', text: 'All participants have been notified of the completed cycle' },
      ]
    },
  };

  function init() {
    const params = new URLSearchParams(window.location.search);
    const phase  = params.get('phase') || 'self';
    const ref    = params.get('ref')   || '';
    const cfg    = PHASE_CONFIG[phase] || PHASE_CONFIG.self;

    // Icon
    const wrapper = document.getElementById('icon-wrapper');
    const symbol  = document.getElementById('icon-symbol');
    wrapper.className = `w-24 h-24 rounded-full flex items-center justify-center mx-auto mb-6 ${cfg.iconBg}`;
    symbol.className  = `material-symbols-outlined text-5xl ${cfg.iconCls}`;
    symbol.textContent = cfg.icon;

    // Text
    document.getElementById('conf-title').textContent   = cfg.title;
    document.getElementById('conf-message').textContent = cfg.message;

    // Next steps
    document.getElementById('next-steps-list').innerHTML = cfg.next.map(item => `
      <div class="flex items-start gap-2.5 text-sm text-slate-600">
        <span class="material-symbols-outlined text-primary text-base mt-0.5 shrink-0">${item.icon}</span>
        <span>${item.text}</span>
      </div>`).join('');

    // Ref
    if (ref) document.getElementById('conf-ref').textContent = `Reference: ${ref}`;

    // Hide PDF button for self phase (no complete report yet)
    if (phase === 'self' || phase === 'reviewer') {
      document.getElementById('btn-pdf').classList.add('hidden');
    }
  }

  function downloadReport() {
    alert('PDF download will be available once the backend is connected.');
  }

  init();
</script>
</body>
</html>
