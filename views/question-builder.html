<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Question Builder – Appraisify</title>
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@200;300;400;500;600;700;800&display=swap" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
  <link href="../assets/css/main.css" rel="stylesheet"/>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            primary: '#136dec',
            'bitrix-blue': '#2fc6f6',
            'background-light': '#f0f3f5',
            'background-dark': '#101822',
          },
          fontFamily: { sans: ['Manrope', 'sans-serif'] },
          borderRadius: { DEFAULT: '0.25rem', lg: '0.5rem', xl: '0.75rem', full: '9999px' },
        },
      },
    }
  </script>
</head>
<body class="bg-background-light text-slate-800 font-sans min-h-screen">

<!-- Header -->
<header class="bg-white border-b border-slate-200 sticky top-0 z-40">
  <div class="max-w-6xl mx-auto px-6 h-14 flex items-center gap-4">
    <div class="flex items-center gap-4">
      <a href="dashboard.html" class="flex items-center gap-1.5 text-slate-500 hover:text-primary transition-colors text-sm font-medium">
        <span class="material-symbols-outlined text-lg">arrow_back</span>
        Dashboard
      </a>
      <div class="w-px h-4 bg-slate-200"></div>
      <div class="flex items-center gap-2">
        <img src="../assets/branding/logos/appraisify-mark-7.svg" alt="Appraisify" class="w-9 h-9 rounded-xl object-cover"/>
        <span class="font-bold text-slate-900">Question Builder</span>
      </div>
    </div>
  </div>
</header>

<main class="max-w-6xl mx-auto px-6 py-6 pb-32">
  <div id="builder-feedback" class="hidden"></div>

  <!-- Metadata: Cascading dropdowns -->
  <div class="bg-white rounded-2xl border border-slate-200 shadow-sm p-5 mb-6">
    <p class="text-xs font-semibold text-slate-500 uppercase tracking-wider mb-4">Template Scope</p>
    <div class="grid grid-cols-1 sm:grid-cols-3 gap-4">
      <div>
        <label class="block text-xs font-semibold text-slate-600 mb-1.5">Appraisal Type</label>
        <select id="meta-type" onchange="onTypeChange()" class="w-full rounded-lg border-slate-200 focus:ring-primary text-sm font-medium">
          <option value="">— Loading… —</option>
        </select>
      </div>
      <div>
        <label class="block text-xs font-semibold text-slate-600 mb-1.5">Target Team</label>
        <select id="meta-team" onchange="onTeamChange()" class="w-full rounded-lg border-slate-200 focus:ring-primary text-sm font-medium" disabled>
          <option value="">— Select type first —</option>
        </select>
      </div>
      <div>
        <label class="block text-xs font-semibold text-slate-600 mb-1.5">Role Level</label>
        <select id="meta-role" class="w-full rounded-lg border-slate-200 focus:ring-primary text-sm font-medium" disabled>
          <option value="">— Select team first —</option>
        </select>
      </div>
    </div>
    <!-- Scope of Work items -->
    <div class="mt-5">
      <label class="block text-xs font-semibold text-slate-600 mb-2">Scope of Work <span class="text-slate-400 font-normal">(responsibilities this appraisal covers)</span></label>
      <div id="scope-items" class="flex flex-wrap gap-2 mb-2">
        <!-- tags injected by JS -->
      </div>
      <div class="flex gap-2">
        <input id="scope-input" type="text" placeholder="e.g. Frontend development, Code reviews…" maxlength="60"
          class="flex-1 rounded-lg border-slate-200 focus:ring-primary text-sm"
          onkeydown="if(event.key==='Enter'){addScopeItem();event.preventDefault()}"/>
        <button onclick="addScopeItem()" class="px-4 py-2 rounded-lg bg-primary/10 text-primary text-sm font-semibold hover:bg-primary/20 transition-colors">
          Add
        </button>
      </div>
    </div>
  </div>

  <!-- 2-column builder -->
  <div class="grid grid-cols-1 lg:grid-cols-5 gap-6">

    <!-- Left: New Question form (sticky) -->
    <div class="lg:col-span-2">
      <div class="bg-white rounded-2xl border border-slate-200 shadow-sm p-6 sticky top-20">
        <h3 class="font-bold text-slate-900 mb-5 flex items-center gap-2">
          <span class="material-symbols-outlined text-primary text-lg">add_circle</span>
          New Question
        </h3>
        <div class="space-y-4">
          <div>
            <label class="block text-xs font-semibold text-slate-600 mb-1.5">Section</label>
            <select id="new-section" class="w-full rounded-lg border-slate-200 focus:ring-primary text-sm">
              <option value="">— Select section —</option>
            </select>
          </div>
          <div>
            <label class="block text-xs font-semibold text-slate-600 mb-1.5">Create New Section</label>
            <div class="flex gap-2">
              <input id="new-section-name" type="text" placeholder="e.g. Technical Skills"
                class="flex-1 rounded-lg border-slate-200 focus:ring-primary text-sm"
                onkeydown="if(event.key==='Enter'){createSectionFromInput();event.preventDefault()}"/>
              <button type="button" onclick="createSectionFromInput()"
                class="px-4 py-2 rounded-lg border border-primary/30 bg-primary/5 text-primary text-sm font-semibold hover:bg-primary/10 transition-colors">
                Add
              </button>
            </div>
          </div>
          <div>
            <label class="block text-xs font-semibold text-slate-600 mb-1.5">Question Text <span class="text-red-500">*</span></label>
            <textarea id="new-question-text" rows="3" placeholder="e.g. How effectively does the employee communicate with stakeholders?"
              class="w-full rounded-lg border-slate-200 focus:ring-primary text-sm resize-none"></textarea>
          </div>
          <div>
            <label class="block text-xs font-semibold text-slate-600 mb-1.5">Description <span class="text-slate-400 font-normal">(optional guidance)</span></label>
            <textarea id="new-question-desc" rows="2" placeholder="Optional: provide guidance on how to score this question…"
              class="w-full rounded-lg border-slate-200 focus:ring-primary text-sm resize-none"></textarea>
          </div>
          <button onclick="addQuestion()" class="w-full flex items-center justify-center gap-2 px-5 py-2.5 rounded-xl bg-primary text-white text-sm font-bold hover:bg-primary/90 transition-colors">
            <span class="material-symbols-outlined text-lg">add</span>
            Add to List
          </button>
        </div>
      </div>
    </div>

    <!-- Right: Question list -->
    <div class="lg:col-span-3">
      <div class="bg-white rounded-2xl border border-slate-200 shadow-sm overflow-hidden">
        <div class="px-6 py-4 border-b border-slate-100 flex items-center justify-between">
          <h3 class="font-bold text-slate-900 flex items-center gap-2">
            <span class="material-symbols-outlined text-primary text-lg">format_list_numbered</span>
            Question Set
            <span id="question-count" class="ml-1 px-2 py-0.5 rounded-full text-xs font-bold bg-primary/10 text-primary">0</span>
          </h3>
          <select id="workspace-select" onchange="switchTab(this.value)"
            class="rounded-lg border-slate-200 focus:ring-primary text-xs font-semibold text-slate-600">
            <option value="scope">Scope of Work</option>
            <option value="engagement">Engagement Review</option>
          </select>
        </div>

        <div id="question-list" class="divide-y divide-slate-100 min-h-[200px]">
          <div class="px-6 py-8 text-center text-slate-400 text-sm" id="empty-state">
            <span class="material-symbols-outlined text-3xl block mb-2 text-slate-300">help_outline</span>
            No questions yet. Use the form on the left to add your first question.
          </div>
        </div>

      </div>
    </div>
  </div>

</main>

<!-- Floating action bar -->
<div class="action-bar">
  <div class="max-w-6xl mx-auto px-6 h-16 flex items-center justify-between">
    <a href="dashboard.html" class="flex items-center gap-2 px-5 py-2.5 rounded-xl border border-slate-200 bg-white text-sm font-semibold text-slate-600 hover:bg-slate-50 transition-colors">
      <span class="material-symbols-outlined text-lg">close</span> Discard
    </a>
    <div class="flex items-center gap-3">
      <span id="template-name-display" class="text-xs text-slate-500 hidden">
        <span class="font-semibold text-slate-700" id="template-name-text"></span>
      </span>
      <button id="btn-save-template" onclick="saveTemplate()" class="flex items-center gap-2 px-7 py-2.5 rounded-xl bg-primary text-white text-sm font-bold hover:bg-primary/90 transition-colors shadow-sm shadow-primary/30">
        <span class="material-symbols-outlined text-lg">save</span>
        Save Template
      </button>
    </div>
  </div>
</div>

<script src="//api.bitrix24.com/api/v1/"></script>
<script src="../assets/js/bx24.js"></script>
<script src="../assets/js/templates-api.js"></script>
<script src="../assets/js/builder.js"></script>
<script>
  let _templatesCache = [];

  BX24App.init(async () => {
    const _u = await BX24App.getUser();
    if (_u.APP_ROLE !== 'admin') { window.location.replace('dashboard.html'); return; }
    refreshSectionDropdown();
    try { _templatesCache = await TemplatesAPI.listTemplates(); } catch (_) { _templatesCache = []; }
    populateMetaDropdownsFromTemplates();
  });

  function getUniqueMetaValues(kind) {
    const seen = new Set();
    const result = [];
    _templatesCache.forEach((tpl) => {
      const v = String(tpl[kind] || '').trim();
      if (v && !seen.has(v.toLowerCase())) { seen.add(v.toLowerCase()); result.push(v); }
    });
    return result.sort();
  }

  function populateMetaDropdownsFromTemplates() {
    const typeEl = document.getElementById('meta-type');
    const types = getUniqueMetaValues('type');
    typeEl.innerHTML = '<option value="">— Select type —</option>' +
      types.map(v => `<option value="${v}">${v}</option>`).join('');
    typeEl.disabled = false;
    document.getElementById('meta-team').innerHTML = '<option value="">— Select type first —</option>';
    document.getElementById('meta-team').disabled = true;
    document.getElementById('meta-role').innerHTML = '<option value="">— Select team first —</option>';
    document.getElementById('meta-role').disabled = true;
  }

  function onTypeChange() {
    const type = document.getElementById('meta-type').value;
    const teamEl = document.getElementById('meta-team');
    const roleEl = document.getElementById('meta-role');
    if (!type) {
      teamEl.innerHTML = '<option value="">— Select type first —</option>';
      teamEl.disabled = true;
      roleEl.innerHTML = '<option value="">— Select team first —</option>';
      roleEl.disabled = true;
    } else {
      const seen = new Set();
      const teams = [];
      _templatesCache.forEach((tpl) => {
        if (String(tpl.type || '').trim().toLowerCase() === type.toLowerCase()) {
          const v = String(tpl.team || '').trim();
          if (v && !seen.has(v.toLowerCase())) { seen.add(v.toLowerCase()); teams.push(v); }
        }
      });
      teamEl.innerHTML = '<option value="">— Select team —</option>' +
        teams.sort().map(v => `<option value="${v}">${v}</option>`).join('');
      teamEl.disabled = false;
      roleEl.innerHTML = '<option value="">— Select team first —</option>';
      roleEl.disabled = true;
    }
    updateTemplateName();
  }

  function onTeamChange() {
    const type = document.getElementById('meta-type').value;
    const team = document.getElementById('meta-team').value;
    const roleEl = document.getElementById('meta-role');
    if (!team) {
      roleEl.innerHTML = '<option value="">— Select team first —</option>';
      roleEl.disabled = true;
    } else {
      const seen = new Set();
      const roles = [];
      _templatesCache.forEach((tpl) => {
        if (
          String(tpl.type || '').trim().toLowerCase() === type.toLowerCase() &&
          String(tpl.team || '').trim().toLowerCase() === team.toLowerCase()
        ) {
          const v = String(tpl.role || '').trim();
          if (v && !seen.has(v.toLowerCase())) { seen.add(v.toLowerCase()); roles.push(v); }
        }
      });
      roleEl.innerHTML = '<option value="">— Select role —</option>' +
        roles.sort().map(v => `<option value="${v}">${v}</option>`).join('');
      roleEl.disabled = false;
    }
    updateTemplateName();
  }

  function updateTemplateName() {
    const type = document.getElementById('meta-type').options[document.getElementById('meta-type').selectedIndex]?.text;
    const team = document.getElementById('meta-team').options[document.getElementById('meta-team').selectedIndex]?.text;
    const role = document.getElementById('meta-role').options[document.getElementById('meta-role').selectedIndex]?.text;
    const parts = [type, team, role].filter(v => v && !v.startsWith('—') && !v.startsWith('All'));
    const name  = parts.join(' · ');
    document.getElementById('template-name-text').textContent = name;
    document.getElementById('template-name-display').classList.toggle('hidden', !name);
  }

  function switchTab(tab) {
    const sel = document.getElementById('workspace-select');
    if (sel) sel.value = tab;
    setWorkspace(tab);
  }

</script>
</body>
</html>
