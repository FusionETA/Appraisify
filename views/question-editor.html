<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Question Editor – Appraisify</title>
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@200;300;400;500;600;700;800&display=swap" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
  <link href="../assets/css/main.css" rel="stylesheet"/>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            primary: '#136dec',
            'bitrix-blue': '#2fc6f6',
            'background-light': '#f0f3f5',
            'background-dark': '#101822',
          },
          fontFamily: { sans: ['Manrope', 'sans-serif'] },
          borderRadius: { DEFAULT: '0.25rem', lg: '0.5rem', xl: '0.75rem', full: '9999px' },
        },
      },
    }
  </script>
</head>
<body class="bg-background-light text-slate-800 font-sans min-h-screen">

<!-- Header -->
<header class="bg-white border-b border-slate-200 sticky top-0 z-40">
  <div class="max-w-4xl mx-auto px-6 h-14 flex items-center gap-4">
    <a href="dashboard.html" class="flex items-center gap-1.5 text-slate-500 hover:text-primary transition-colors text-sm font-medium">
      <span class="material-symbols-outlined text-lg">arrow_back</span>
      Dashboard
    </a>
    <div class="w-px h-4 bg-slate-200"></div>
    <div class="flex items-center gap-2">
      <img src="../assets/branding/logos/appraisify-mark-7.svg" alt="Appraisify" class="w-9 h-9 rounded-xl object-cover"/>
      <span class="font-bold text-slate-900">Question Editor</span>
    </div>
  </div>
</header>

<main class="max-w-4xl mx-auto px-6 py-6 pb-32">

  <!-- Template selector -->
  <div class="bg-white rounded-2xl border border-slate-200 shadow-sm p-5 mb-6">
    <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-3 mb-4">
      <div>
        <label class="block text-xs font-semibold text-slate-600 mb-1.5">Filter Type</label>
        <select id="filter-type" class="w-full rounded-lg border-slate-200 focus:ring-primary text-sm">
          <option value="">All Types</option>
          <option value="annual">Annual Review</option>
          <option value="semi">Semi-Annual Review</option>
          <option value="quarterly">Quarterly Review</option>
          <option value="probation">Probation Review</option>
        </select>
      </div>
      <div>
        <label class="block text-xs font-semibold text-slate-600 mb-1.5">Filter Team</label>
        <select id="filter-team" class="w-full rounded-lg border-slate-200 focus:ring-primary text-sm">
          <option value="">All Teams</option>
          <option value="engineering">Engineering</option>
          <option value="marketing">Marketing</option>
          <option value="operations">Operations</option>
          <option value="sales">Sales</option>
          <option value="all">Generic (All Teams)</option>
        </select>
      </div>
      <div>
        <label class="block text-xs font-semibold text-slate-600 mb-1.5">Filter Role</label>
        <select id="filter-role" class="w-full rounded-lg border-slate-200 focus:ring-primary text-sm">
          <option value="">All Roles</option>
          <option value="junior">Junior</option>
          <option value="mid">Mid-level</option>
          <option value="senior">Senior</option>
          <option value="lead">Lead / Manager</option>
          <option value="all">Generic (All Roles)</option>
        </select>
      </div>
      <label class="flex items-center gap-2 text-xs font-medium text-slate-600 self-end pb-2 cursor-pointer">
        <input id="filter-include-generic" type="checkbox" checked class="rounded border-slate-300 text-primary focus:ring-primary"/>
        Include generic templates
      </label>
    </div>
    <div class="flex items-end gap-4">
      <div class="flex-1">
        <label class="block text-xs font-semibold text-slate-600 mb-1.5">Select Question Set to Edit</label>
        <select id="template-select" onchange="loadSet()" class="w-full rounded-lg border-slate-200 focus:ring-primary text-sm font-medium">
          <option value="">— Choose a saved template —</option>
        </select>
      </div>
      <a href="question-builder.html" class="flex items-center gap-2 px-5 py-2.5 rounded-xl border border-primary text-primary text-sm font-semibold hover:bg-primary/5 transition-colors shrink-0">
        <span class="material-symbols-outlined text-lg">add</span>
        New Template
      </a>
    </div>
  </div>

  <!-- Empty state -->
  <div id="empty-state" class="bg-white rounded-2xl border border-slate-200 shadow-sm p-12 text-center">
    <span class="material-symbols-outlined text-4xl text-slate-300 block mb-3">edit_note</span>
    <p class="text-slate-500 text-sm">Select a question set above to begin editing.</p>
  </div>

  <!-- Editor (hidden until set loaded) -->
  <div id="editor-content" class="hidden space-y-6">

    <!-- Set metadata -->
    <div class="bg-white rounded-2xl border border-slate-200 shadow-sm p-5">
      <h3 class="font-bold text-slate-900 mb-4">Template Details</h3>
      <div class="grid grid-cols-1 sm:grid-cols-3 gap-4">
        <div>
          <div class="flex items-center justify-between mb-1.5">
            <label class="block text-xs font-semibold text-slate-600">Appraisal Type</label>
            <div class="flex items-center gap-2">
              <button type="button" onclick="renameMetaOption('type')" class="text-xs text-slate-500 font-semibold hover:underline">Rename</button>
              <button type="button" onclick="addCustomMetaOption('type')" class="text-xs text-primary font-semibold hover:underline">+ Add custom</button>
            </div>
          </div>
          <select id="edit-type" class="w-full rounded-lg border-slate-200 focus:ring-primary text-sm">
            <option value="">— Select type —</option>
          </select>
        </div>
        <div>
          <div class="flex items-center justify-between mb-1.5">
            <label class="block text-xs font-semibold text-slate-600">Target Team</label>
            <div class="flex items-center gap-2">
              <button type="button" onclick="renameMetaOption('team')" class="text-xs text-slate-500 font-semibold hover:underline">Rename</button>
              <button type="button" onclick="addCustomMetaOption('team')" class="text-xs text-primary font-semibold hover:underline">+ Add custom</button>
            </div>
          </div>
          <select id="edit-team" class="w-full rounded-lg border-slate-200 focus:ring-primary text-sm">
            <option value="">— Select team —</option>
          </select>
        </div>
        <div>
          <div class="flex items-center justify-between mb-1.5">
            <label class="block text-xs font-semibold text-slate-600">Role Level</label>
            <div class="flex items-center gap-2">
              <button type="button" onclick="renameMetaOption('role')" class="text-xs text-slate-500 font-semibold hover:underline">Rename</button>
              <button type="button" onclick="addCustomMetaOption('role')" class="text-xs text-primary font-semibold hover:underline">+ Add custom</button>
            </div>
          </div>
          <select id="edit-role" class="w-full rounded-lg border-slate-200 focus:ring-primary text-sm">
            <option value="">— Select role —</option>
          </select>
        </div>
      </div>
    </div>

    <!-- Question list (editable) -->
    <div class="bg-white rounded-2xl border border-slate-200 shadow-sm overflow-hidden">
      <div class="px-6 py-4 border-b border-slate-100 flex items-center justify-between">
        <h3 class="font-bold text-slate-900 flex items-center gap-2">
          <span class="material-symbols-outlined text-primary text-lg">list</span>
          Questions
          <span id="edit-count" class="ml-1 px-2 py-0.5 rounded-full text-xs font-bold bg-primary/10 text-primary">0</span>
        </h3>
        <button onclick="addInlineQuestion()" class="flex items-center gap-1.5 text-sm font-semibold text-primary hover:underline">
          <span class="material-symbols-outlined text-base">add</span> Add question
        </button>
      </div>
      <div id="edit-question-list" class="divide-y divide-slate-100">
        <!-- populated by JS -->
      </div>
    </div>

  </div>
</main>

<!-- Action bar -->
<div class="action-bar">
  <div class="max-w-4xl mx-auto px-6 h-16 flex items-center justify-between">
    <div class="flex items-center gap-3">
      <a href="dashboard.html" class="flex items-center gap-2 px-5 py-2.5 rounded-xl border border-slate-200 bg-white text-sm font-semibold text-slate-600 hover:bg-slate-50 transition-colors">
        <span class="material-symbols-outlined text-lg">close</span> Cancel
      </a>
      <button id="btn-delete-set" onclick="confirmDeleteSet()" class="hidden flex items-center gap-2 px-5 py-2.5 rounded-xl border border-red-200 bg-white text-sm font-semibold text-red-600 hover:bg-red-50 transition-colors">
        <span class="material-symbols-outlined text-lg">delete</span> Delete Set
      </button>
    </div>
    <button id="btn-save-changes" onclick="saveChanges()" disabled
      class="flex items-center gap-2 px-7 py-2.5 rounded-xl bg-primary text-white text-sm font-bold hover:bg-primary/90 transition-colors shadow-sm shadow-primary/30 disabled:opacity-40 disabled:cursor-not-allowed">
      <span class="material-symbols-outlined text-lg">save</span>
      Save Changes
    </button>
  </div>
</div>

<!-- Delete confirmation modal -->
<div id="modal-delete" class="fixed inset-0 bg-black/40 backdrop-blur-sm z-50 hidden flex items-center justify-center p-4">
  <div class="bg-white rounded-2xl shadow-2xl w-full max-w-sm p-8 text-center">
    <div class="w-14 h-14 bg-red-100 rounded-full flex items-center justify-center mx-auto mb-4">
      <span class="material-symbols-outlined text-red-600 text-3xl">delete</span>
    </div>
    <h3 class="text-xl font-extrabold text-slate-900 mb-2">Delete this set?</h3>
    <p class="text-slate-500 text-sm mb-6">This action cannot be undone. Any active appraisals using this template will retain a copy of the questions.</p>
    <div class="flex gap-3">
      <button onclick="document.getElementById('modal-delete').classList.add('hidden')"
        class="flex-1 px-5 py-2.5 rounded-xl border border-slate-200 text-sm font-semibold text-slate-600 hover:bg-slate-50">
        Cancel
      </button>
      <button onclick="deleteSet()"
        class="flex-1 px-5 py-2.5 rounded-xl bg-red-600 text-white text-sm font-bold hover:bg-red-700">
        Delete
      </button>
    </div>
  </div>
</div>

<script src="//api.bitrix24.com/api/v1/"></script>
<script src="../assets/js/bx24.js"></script>
<script src="../assets/js/meta-options.js"></script>
<script src="../assets/js/templates-api.js"></script>
<script src="../assets/js/template-filters.js"></script>
<script src="../assets/js/builder.js"></script>
<script>
  let templatesCache = [];
  let currentTemplateId = '';
  let editState = { questions: [], dirty: false, scopeItems: [] };

  BX24App.init(async () => {
    const _u = await BX24App.getUser();
    if (_u.APP_ROLE !== 'admin') { window.location.replace('dashboard.html'); return; }
    AppraisifyMetaOptions.load('filter-type', 'type');
    AppraisifyMetaOptions.load('filter-team', 'team');
    AppraisifyMetaOptions.load('filter-role', 'role');
    AppraisifyMetaOptions.load('edit-type', 'type');
    AppraisifyMetaOptions.load('edit-team', 'team');
    AppraisifyMetaOptions.load('edit-role', 'role');
    ['filter-type', 'filter-team', 'filter-role', 'filter-include-generic'].forEach((id) => {
      document.getElementById(id)?.addEventListener('change', applyTemplateFilters);
    });
    ['edit-type', 'edit-team', 'edit-role'].forEach((id) => {
      document.getElementById(id)?.addEventListener('change', markDirty);
    });
    await loadTemplateOptions();
  });

  function groupQuestionsForWorkspace(questions) {
    return questions.reduce((acc, q) => {
      const key = q._workspace === 'engagement' ? 'engagement' : 'scope';
      acc[key].push({
        _uid: q._uid,
        section: q.section,
        text: q.text,
        desc: q.desc || '',
      });
      return acc;
    }, { scope: [], engagement: [] });
  }

  function resolveMetaSelect(selectId, tplValue) {
    if (!tplValue) return;
    const selectEl = document.getElementById(selectId);
    if (!selectEl) return;
    const norm = String(tplValue).trim().toLowerCase();
    const match = Array.from(selectEl.options).find(o =>
      o.value === tplValue ||
      o.value.toLowerCase() === norm ||
      o.textContent.trim().toLowerCase() === norm
    );
    if (match) { selectEl.value = match.value; return; }
    // Value not in list — add it as a new option and select it
    AppraisifyMetaOptions.ensureValue(selectId, tplValue, tplValue);
  }

  function getFilterCriteria() {
    return {
      type: document.getElementById('filter-type')?.value || '',
      team: document.getElementById('filter-team')?.value || '',
      role: document.getElementById('filter-role')?.value || '',
      includeGeneric: !!document.getElementById('filter-include-generic')?.checked,
    };
  }

  function applyTemplateFilters() {
    const select = document.getElementById('template-select');
    if (!select) return;
    const previousValue = select.value || '';

    const filtered = AppraisifyTemplateFilters.filterTemplates(templatesCache, getFilterCriteria());
    const nextValue = AppraisifyTemplateFilters.renderSelectOptions(select, filtered, {
      previousValue,
      placeholder: '— Choose a saved template —',
      noMatchLabel: '— No templates match selected filters —',
    });

    if (nextValue !== previousValue) {
      loadSet();
    }
  }

  function hydrateFilterOptionsFromTemplates(templates) {
    if (!Array.isArray(templates)) return;

    const types = new Set();
    const teams = new Set();
    const roles = new Set();

    templates.forEach((tpl) => {
      const type = String(tpl?.type || '').trim();
      const team = String(tpl?.team || '').trim();
      const role = String(tpl?.role || '').trim();
      if (type) types.add(type);
      if (team) teams.add(team);
      if (role) roles.add(role);
    });

    types.forEach((v) => AppraisifyMetaOptions.ensureOptionValue('filter-type', v, v));
    teams.forEach((v) => AppraisifyMetaOptions.ensureOptionValue('filter-team', v, v));
    roles.forEach((v) => AppraisifyMetaOptions.ensureOptionValue('filter-role', v, v));
  }

  async function loadTemplateOptions() {
    const select = document.getElementById('template-select');
    select.disabled = true;
    try {
      templatesCache = await TemplatesAPI.listTemplates();
      hydrateFilterOptionsFromTemplates(templatesCache);
      applyTemplateFilters();
    } catch (e) {
      alert(`Failed to load templates: ${e.message || e}`);
      select.innerHTML = '<option value="">— Unable to load templates —</option>';
    } finally {
      select.disabled = false;
    }
  }

  async function loadSet() {
    const id = document.getElementById('template-select').value;
    if (!id) {
      document.getElementById('empty-state').classList.remove('hidden');
      document.getElementById('editor-content').classList.add('hidden');
      document.getElementById('btn-delete-set').classList.add('hidden');
      document.getElementById('btn-save-changes').disabled = true;
      currentTemplateId = '';
      return;
    }

    let tpl;
    try {
      tpl = await TemplatesAPI.getTemplate(id);
    } catch (e) {
      alert(`Failed to load template: ${e.message || e}`);
      return;
    }
    if (!tpl) return;
    currentTemplateId = tpl.id;

    document.getElementById('empty-state').classList.add('hidden');
    document.getElementById('editor-content').classList.remove('hidden');
    document.getElementById('btn-delete-set').classList.remove('hidden');
    document.getElementById('btn-save-changes').disabled = true;

    resolveMetaSelect('edit-type', tpl.type);
    resolveMetaSelect('edit-team', tpl.team);
    resolveMetaSelect('edit-role', tpl.role);

    const scope = Array.isArray(tpl.sections?.scope) ? tpl.sections.scope : [];
    const engagement = Array.isArray(tpl.sections?.engagement) ? tpl.sections.engagement : [];
    editState.questions = scope.map(q => ({ ...q, _workspace: 'scope', _uid: q._uid || Math.random().toString(36).slice(2) }))
      .concat(engagement.map(q => ({ ...q, _workspace: 'engagement', _uid: q._uid || Math.random().toString(36).slice(2) })));
    editState.scopeItems = Array.isArray(tpl.scopeItems) ? tpl.scopeItems : [];
    editState.dirty = false;
    renderEditList();
  }

  function renderEditList() {
    const list = document.getElementById('edit-question-list');
    document.getElementById('edit-count').textContent = editState.questions.length;

    if (!editState.questions.length) {
      list.innerHTML = '<div class="px-6 py-8 text-center text-slate-400 text-sm">No questions in this set.</div>';
      return;
    }

    // Group by section
    const sections = {};
    editState.questions.forEach(q => {
      if (!sections[q.section]) sections[q.section] = [];
      sections[q.section].push(q);
    });

    list.innerHTML = Object.entries(sections).map(([section, qs]) => `
      <div class="section-group">
        <div class="px-6 py-2 bg-slate-50/70 border-b border-slate-100">
          <span class="text-xs font-semibold text-primary uppercase tracking-wider">${section}</span>
        </div>
        ${qs.map((q, i) => `
          <div class="flex items-start gap-4 px-6 py-4 hover:bg-slate-50/50 group" data-uid="${q._uid}">
            <span class="material-symbols-outlined text-slate-300 cursor-grab mt-0.5 select-none">drag_indicator</span>
            <div class="flex-1 min-w-0">
              <div contenteditable="true" spellcheck="false"
                class="text-sm font-medium text-slate-800 outline-none border-b border-transparent focus:border-primary pb-0.5 transition-colors"
                oninput="markDirty()"
                data-uid="${q._uid}">${q.text}</div>
              ${q.desc ? `<p class="text-xs text-slate-500 mt-1">${q.desc}</p>` : ''}
            </div>
            <button onclick="deleteQuestion('${q._uid}')"
              class="opacity-0 group-hover:opacity-100 transition-opacity text-red-400 hover:text-red-600 shrink-0 mt-0.5">
              <span class="material-symbols-outlined text-base">delete</span>
            </button>
          </div>`).join('')}
      </div>`).join('');
  }

  function addInlineQuestion() {
    const text = prompt('Enter new question text:');
    if (!text?.trim()) return;
    const section = prompt('Section name:', editState.questions[0]?.section || 'General');
    if (!section) return;
    editState.questions.push({ id: 'new_' + Date.now(), text: text.trim(), desc: '', section: section.trim(), _uid: Math.random().toString(36).slice(2) });
    markDirty();
    renderEditList();
  }

  function deleteQuestion(uid) {
    if (!confirm('Remove this question?')) return;
    editState.questions = editState.questions.filter(q => q._uid !== uid);
    markDirty();
    renderEditList();
  }

  function markDirty() {
    editState.dirty = true;
    document.getElementById('btn-save-changes').disabled = false;
  }

  function confirmDeleteSet() {
    document.getElementById('modal-delete').classList.remove('hidden');
  }

  async function deleteSet() {
    document.getElementById('modal-delete').classList.add('hidden');
    if (!currentTemplateId) return;
    try {
      await TemplatesAPI.deleteTemplate(currentTemplateId);
      await loadTemplateOptions();
      document.getElementById('template-select').value = '';
      loadSet();
      alert('Template deleted.');
    } catch (e) {
      alert(`Delete failed: ${e.message || e}`);
    }
  }

  async function saveChanges() {
    if (!currentTemplateId) return;
    // Capture any inline edits from contenteditable
    document.querySelectorAll('[contenteditable][data-uid]').forEach(el => {
      const uid = el.dataset.uid;
      const q = editState.questions.find(q => q._uid === uid);
      if (q) q.text = el.textContent.trim();
    });

    const sections = groupQuestionsForWorkspace(editState.questions);
    const payload = {
      type: document.getElementById('edit-type').value,
      team: document.getElementById('edit-team').value,
      role: document.getElementById('edit-role').value,
      sections,
      scopeItems: editState.scopeItems,
    };

    const btn = document.getElementById('btn-save-changes');
    btn.disabled = true;
    try {
      await TemplatesAPI.updateTemplate(currentTemplateId, payload);
      editState.dirty = false;
      await loadTemplateOptions();
      const select = document.getElementById('template-select');
      if (Array.from(select.options).some((opt) => opt.value === currentTemplateId)) {
        select.value = currentTemplateId;
      }
      alert('Changes saved.');
    } catch (e) {
      alert(`Save failed: ${e.message || e}`);
      btn.disabled = false;
    }
  }

  async function renameMetaOption(kind) {
    const map = {
      type: { id: 'edit-type' },
      team: { id: 'edit-team' },
      role: { id: 'edit-role' },
    };
    const cfg = map[kind];
    if (!cfg) return;
    const selectEl = document.getElementById(cfg.id);
    const selected = selectEl?.options[selectEl.selectedIndex];
    if (!selected || !selected.value) { alert('Select an option to rename first.'); return; }
    const oldLabel = selected.text;
    const oldValue = selected.value;
    const newLabel = window.prompt(`Rename "${oldLabel}" to:`, oldLabel);
    if (!newLabel || newLabel.trim() === oldLabel) return;
    const result = AppraisifyMetaOptions.renameCustomValue(kind, oldValue, newLabel);
    if (!result.ok) { alert(`Rename failed: ${result.reason}`); return; }
    // Update matching templates in the database
    const matching = templatesCache.filter((tpl) => {
      const v = String(tpl[kind] || '').trim();
      return v.toLowerCase() === oldLabel.toLowerCase() || v === oldValue;
    });
    await Promise.allSettled(matching.map((tpl) =>
      TemplatesAPI.updateTemplate(tpl.id, { [kind]: result.label })
        .then(() => { tpl[kind] = result.label; })
    ));
    // Update DOM
    selected.text = result.label;
    const filterOpt = Array.from(document.getElementById(`filter-${kind}`)?.options || []).find(o => o.value === oldValue);
    if (filterOpt) filterOpt.text = result.label;
    markDirty();
  }

  function addCustomMetaOption(kind) {
    const map = {
      type: { id: 'edit-type', label: 'appraisal type' },
      team: { id: 'edit-team', label: 'team' },
      role: { id: 'edit-role', label: 'role level' },
    };
    const cfg = map[kind];
    if (!cfg) return;
    const added = AppraisifyMetaOptions.addCustom(cfg.id, kind, cfg.label);
    if (added) {
      AppraisifyMetaOptions.ensureValue(`filter-${kind}`, added.value, added.label);
      markDirty();
    }
  }
</script>
</body>
</html>
